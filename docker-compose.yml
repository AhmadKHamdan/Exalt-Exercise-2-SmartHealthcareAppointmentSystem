version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: healthcare-mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - healthcare-network

  mongodb:
    image: mongo:7
    container_name: healthcare-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - healthcare-network

  backend:
    build: .
    container_name: healthcare-backend
    restart: always
    depends_on:
      - mysql
      - mongodb
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_healthcare
      SPRING_DATASOURCE_USERNAME: healthcare_user
      SPRING_DATASOURCE_PASSWORD: healthcare_pass

      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/healthcare_records

    networks:
      - healthcare-network

volumes:
  mysql_data:
  mongo_data:

networks:
  healthcare-network:
