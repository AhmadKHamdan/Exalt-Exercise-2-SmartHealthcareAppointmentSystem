spring.application.name=Smart Healthcare Appointment System

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=AhmadAhmadAhmadAhmadAhmadAhmadAhmadAhmadAhmadAhmad
jwt.expiration=70000000

spring.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

logging.file.name=logs/app.log

logging.level.root=WARN
logging.level.com.exalt.smarthealthcareappointmentsystem.audit=INFO

logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.mongodb.driver=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springdoc=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.apache.tomcat=WARN

spring.jpa.show-sql=false
spring.main.log-startup-info=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=jcache
spring.jpa.properties.hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider
spring.jpa.properties.hibernate.javax.cache.uri=classpath:ehcache.xml
spring.jpa.properties.hibernate.cache.use_query_cache=false